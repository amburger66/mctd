defaults:
  - base_pytorch

training:
  lr: 5e-4
  precision: 16-mixed
  batch_size: 2048 # will use 16G GPU memory;
  max_epochs: -1
  max_steps: 500000 # 50k steps should be enough for large, and 100k for medium

  checkpointing:
    every_n_train_steps: 25000 # save a checkpoint every n train steps
    enable_version_counter: True # If this is ``False``, later checkpoint will be overwrite previous ones.
    save_top_k: -1 # -1 keeps all checkpoints; default of 1 overwrites previous each time

validation:
  precision: 32
  inference_mode: False
  batch_size: 2
  val_every_n_step: null # change to 1 when visualizing a trained checkpoint
  val_every_n_epoch: 5000 # change to null when visualizing a trained checkpoint
  limit_batch: 1
  seed: 1
